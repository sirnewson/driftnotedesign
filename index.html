<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wynmind Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:wght@400;700&family=Caveat:wght@400;700&family=Inter:wght@100..900&family=Space+Grotesk:wght@300..700&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Montserrat:wght@100..900&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --wyn-dark: #1c2c1a;
            --wyn-lime: #8eb500;
            --wyn-white: #ffffff;
            --ui-bg: #ffffff;
            --ui-border: #f1f5f9;
            --ui-text: #1c2c1a;
            --frame-text-color: var(--wyn-white);
        }

        body {
            background-color: #f8fafc;
            color: var(--ui-text);
            font-family: 'DM Sans', sans-serif;
            overscroll-behavior: none;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .app-container { height: 100dvh; display: flex; flex-direction: column; }
        @media (min-width: 768px) { .app-container { flex-direction: row; } }

        .preview-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e2e8f0;
            padding: 16px;
            overflow: hidden;
            position: relative;
        }

        .export-frame {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 0 6%; /* Reduced side padding to give text layer more room */
            transition: background 0.5s ease;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.3);
            background-size: cover;
            background-position: center;
        }

        .export-frame::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.1);
            pointer-events: none;
            z-index: 1;
        }

        .frame-dark-overlay::after { background: rgba(0,0,0,0.35); }
        .frame-light-overlay::after { background: rgba(255,255,255,0.1); }

        .aspect-4-5 { aspect-ratio: 4 / 5; height: 100%; max-height: 75vh; width: auto; }
        .aspect-9-16 { aspect-ratio: 9 / 16; height: 100%; max-height: 80vh; width: auto; }

        @media (max-width: 768px) {
            .aspect-4-5 { max-height: 42vh; width: 85vw; }
            .aspect-9-16 { max-height: 48vh; width: 70vw; }
        }

        .content-movable {
            position: relative;
            z-index: 10;
            width: 100%;
            transition: transform 0.1s linear;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .quote-text {
            color: var(--frame-text-color);
            width: 100%; /* Controlled by slider */
            text-wrap: wrap; 
            transition: width 0.2s ease, font-size 0.2s ease, font-weight 0.2s ease;
            margin-left: auto;
            margin-right: auto;
            display: block;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .quote-text.align-justify {
            text-align: justify;
            text-align-last: center;
            text-justify: inter-word;
        }

        .highlight { 
            color: var(--wyn-lime) !important;
        }
        
        .word-btn {
            cursor: pointer;
            display: inline-block;
            margin-right: 0.12em;
            -webkit-tap-highlight-color: transparent;
        }

        .controls-section { background: var(--ui-bg); border-top: 1px solid var(--ui-border); z-index: 50; }
        @media (max-width: 768px) { .controls-section { height: 55dvh; border-top-left-radius: 2.5rem; border-top-right-radius: 2.5rem; } }
        @media (min-width: 768px) { .controls-section { width: 460px; height: 100%; border-left: 1px solid var(--ui-border); } }

        .controls-area::-webkit-scrollbar { display: none; }

        input[type="range"] { -webkit-appearance: none; height: 4px; background: #f1f5f9; border-radius: 4px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--wyn-lime); border: 3px solid #fff; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        .ui-input { background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 1rem; padding: 1rem; font-size: 0.875rem; width: 100%; transition: border 0.2s; }
        .ui-input:focus { outline: none; border-color: var(--wyn-lime); }
        
        .btn-toggle { background: #f8fafc; color: #94a3b8; font-weight: 700; transition: all 0.2s; border-radius: 0.75rem; }
        .btn-toggle.active { background: var(--wyn-dark); color: #fff; }

        .bg-thumbnail { width: 100%; aspect-ratio: 1; border-radius: 12px; background-size: cover; cursor: pointer; border: 3px solid transparent; }
        .bg-thumbnail.active { border-color: var(--wyn-lime); transform: scale(0.95); }
        
        .toggle-switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e2e8f0; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--wyn-lime); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Preview Area -->
        <main class="preview-section">
            <div id="exportContainer" class="export-frame aspect-4-5" style="background-color: #1c2c1a;">
                
                <!-- Branding Header -->
                <div class="absolute top-12 left-0 right-0 flex flex-col items-center pointer-events-none z-20">
                    <img src="https://i.ibb.co/8L1v84zn/normal-logo.png" alt="Wynmind" class="brightness-0 invert opacity-90 transition-all" id="frameLogo" style="height: 28px;">
                </div>
                
                <!-- Movable Content Wrapper -->
                <div id="contentMovable" class="content-movable">
                    <div id="quoteDisplay" class="quote-text font-bold text-[32px] tracking-tight text-center leading-[1.05] lowercase"></div>
                    <div id="authorDisplay" class="mt-10 text-[11px] font-bold tracking-[0.2em] uppercase opacity-80 text-center flex items-center justify-center transition-all" style="color: var(--frame-text-color)"></div>
                </div>

                <!-- Branding Footer -->
                <div class="absolute bottom-10 left-0 right-0 text-center pointer-events-none z-20">
                    <span class="text-[10px] tracking-[0.5em] font-black uppercase opacity-40" style="color: var(--frame-text-color)">wynmind.com</span>
                </div>
            </div>
        </main>

        <!-- Controls Sidebar -->
        <aside class="controls-section flex flex-col">
            <div class="px-8 py-5 flex justify-between items-center border-b border-slate-50">
                <h1 class="text-xs font-black tracking-[0.3em] text-slate-900 uppercase">Wynmind Studio</h1>
                <div id="charCount" class="text-[10px] font-mono text-slate-400 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">0/800</div>
            </div>

            <div class="controls-area flex-1 overflow-y-auto px-8 py-6 space-y-8 pb-32">
                
                <!-- Content Input -->
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">The Message</label>
                    <textarea id="quoteInput" maxlength="800" class="ui-input resize-none min-h-[120px] font-medium" placeholder="Share your insight..."></textarea>
                </div>

                <!-- Logo Style Selector -->
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Branding Layout</label>
                    <div class="flex gap-2 p-1 bg-slate-50 rounded-2xl">
                        <button onclick="setLogoStyle('normal', this)" class="btn-toggle active flex-1 py-3 text-[9px]">NORMAL LOGO</button>
                        <button onclick="setLogoStyle('wide', this)" class="btn-toggle flex-1 py-3 text-[9px]">WIDE LOGO</button>
                    </div>
                </div>

                <!-- Attribution Section -->
                <div class="space-y-4 bg-slate-50 p-5 rounded-3xl">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Attribution</label>
                        <div class="flex items-center gap-2">
                            <span class="text-[9px] font-bold text-slate-400 uppercase">Show</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="showAuthor" checked onchange="updatePreview()">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <input id="authorInput" type="text" class="ui-input border-slate-100 bg-white" placeholder="Wynmind Team">
                </div>

                <!-- Background Mood -->
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Mood Backgrounds</label>
                    <div class="grid grid-cols-5 gap-3">
                        <div onclick="setBackground('solid', this)" class="bg-thumbnail active" style="background-color: #1c2c1a;"></div>
                        <div onclick="setBackground('img1', this)" class="bg-thumbnail" style="background-image: url('https://cdn.midjourney.com/3ce0bc29-b944-4d3a-8ae6-e2604604ee12/0_3.png')"></div>
                        <div onclick="setBackground('img2', this)" class="bg-thumbnail" style="background-image: url('https://cdn.midjourney.com/f2413950-910c-4009-b380-446d0a164728/0_0.png')"></div>
                        <div onclick="setBackground('img3', this)" class="bg-thumbnail" style="background-image: url('https://cdn.midjourney.com/c0f64c21-24f7-4b4d-baf0-a1b84ed9e902/0_0.png')"></div>
                        <div onclick="setBackground('white', this)" class="bg-thumbnail border-slate-100" style="background-color: #ffffff;"></div>
                    </div>
                </div>

                <!-- Color & Align -->
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Font Color</label>
                        <div class="flex gap-2 p-1 bg-slate-50 rounded-2xl">
                            <button onclick="setTextColor('#ffffff', this)" class="btn-toggle active flex-1 py-3 text-[9px]">WHITE</button>
                            <button onclick="setTextColor('#1c2c1a', this)" class="btn-toggle flex-1 py-3 text-[9px]">DARK</button>
                            <button onclick="setTextColor('#8eb500', this)" class="btn-toggle flex-1 py-3 text-[9px]">LIME</button>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Alignment</label>
                        <div class="grid grid-cols-4 gap-1 bg-slate-50 p-1 rounded-2xl">
                            <button onclick="setAlign('left', this)" class="btn-toggle py-3 text-[9px]">L</button>
                            <button onclick="setAlign('center', this)" class="btn-toggle active py-3 text-[9px]">C</button>
                            <button onclick="setAlign('right', this)" class="btn-toggle py-3 text-[9px]">R</button>
                            <button onclick="setAlign('justify', this)" class="btn-toggle py-3 text-[9px]">B</button>
                        </div>
                    </div>
                </div>

                <!-- Sizing Refinement -->
                <div class="bg-slate-50 p-6 rounded-3xl space-y-6">
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 block mb-4">Post Refinement</label>
                    <div class="space-y-4">
                        <div class="flex items-center gap-4">
                            <span class="text-[9px] font-bold text-slate-400 uppercase w-20">Font Size</span>
                            <input type="range" id="fontSize" min="12" max="70" value="24" class="flex-1">
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-[9px] font-bold text-slate-400 uppercase w-20">Text Width</span>
                            <input type="range" id="textWidth" min="20" max="100" value="95" class="flex-1">
                        </div>
                        <div class="flex items-center gap-4 border-t border-slate-200 pt-4 mt-4">
                            <span class="text-[9px] font-bold text-slate-400 uppercase w-20">Logo Scale</span>
                            <input type="range" id="logoScale" min="20" max="100" value="28" class="flex-1">
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-[9px] font-bold text-slate-400 uppercase w-20">Author Size</span>
                            <input type="range" id="authorScale" min="8" max="24" value="11" class="flex-1">
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-[9px] font-bold text-slate-400 uppercase w-20">Vertical Pos</span>
                            <input type="range" id="contentY" min="-250" max="250" value="0" class="flex-1">
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-[9px] font-bold text-slate-400 uppercase w-20">Weight</span>
                            <input type="range" id="fontWeight" min="100" max="900" step="100" value="500" class="flex-1">
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-[9px] font-bold text-slate-400 uppercase w-20">Line H</span>
                            <input type="range" id="lineHeight" min="0.8" max="1.8" step="0.05" value="1.1" class="flex-1">
                        </div>
                    </div>
                </div>

                <!-- Canvas & Typography -->
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Typography</label>
                        <select id="fontSelect" onchange="setFont(this.value)" class="ui-input p-3 text-xs font-bold appearance-none">
                            <option value="'DM Sans', sans-serif">DM Sans</option>
                            <option value="'Inter', sans-serif">Inter (Modern)</option>
                            <option value="'Space Grotesk', sans-serif">Space Grotesk (Tech)</option>
                            <option value="'Montserrat', sans-serif">Montserrat (Geometric)</option>
                            <option value="'Syne', sans-serif">Syne (Artistic)</option>
                            <option value="'Playfair Display', serif">Playfair Display (Elegant)</option>
                            <option value="'Cormorant Garamond', serif">Cormorant (Classic)</option>
                            <option value="'JetBrains Mono', monospace">JetBrains (Technical)</option>
                            <option value="'Caveat', cursive">Caveat (Signature)</option>
                        </select>
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Canvas Ratio</label>
                        <select onchange="setRatio(this.value)" class="ui-input p-3 text-xs font-bold appearance-none">
                            <option value="4-5">4:5 Feed</option>
                            <option value="9-16">9:16 Story</option>
                        </select>
                    </div>
                </div>

                <!-- Casing -->
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Text Casing</label>
                    <div class="flex bg-slate-100 p-1 rounded-2xl">
                        <button onclick="setCase('lowercase', this)" class="btn-toggle active flex-1 py-3 text-[10px]">abc</button>
                        <button onclick="setCase('none', this)" class="btn-toggle flex-1 py-3 text-[10px]">Aa</button>
                        <button onclick="setCase('uppercase', this)" class="btn-toggle flex-1 py-3 text-[10px]">ABC</button>
                    </div>
                </div>

                <button onclick="downloadImage()" class="w-full py-6 bg-[#8eb500] text-white font-black uppercase tracking-[0.4em] text-[10px] rounded-3xl shadow-xl active:scale-[0.98] transition-all">CAPTURE POST</button>
            </div>
        </aside>
    </div>

    <script>
        const quoteInput = document.getElementById('quoteInput');
        const quoteDisplay = document.getElementById('quoteDisplay');
        const authorDisplay = document.getElementById('authorDisplay');
        const authorInput = document.getElementById('authorInput');
        const showAuthor = document.getElementById('showAuthor');
        const exportContainer = document.getElementById('exportContainer');
        const frameLogo = document.getElementById('frameLogo');
        const contentMovable = document.getElementById('contentMovable');

        let highlightedIndices = new Set();
        let currentBg = 'solid';
        let logoStyle = 'normal';

        const logoAssets = {
            normal: {
                standard: 'https://i.ibb.co/8L1v84zn/normal-logo.png',
                whiteBg: 'https://i.ibb.co/QvfxFdQ8/normal-on-white-background.png'
            },
            wide: {
                standard: 'https://i.ibb.co/cXCkntNf/wide-logo.png',
                whiteBg: 'https://i.ibb.co/CpwWRT3n/wide-on-whitebackground.png'
            }
        };

        quoteInput.value = "true transformation happens when we align human curiosity with technological capability. we don't just build systems; we design experiences.";
        authorInput.value = "Wynmind Team";

        function updatePreview() {
            const text = quoteInput.value.trim() || "Start typing...";
            const words = text.split(/\s+/);
            document.getElementById('charCount').innerText = `${quoteInput.value.length}/800`;

            quoteDisplay.innerHTML = '';
            words.forEach((word, index) => {
                const span = document.createElement('span');
                span.innerText = word;
                span.className = 'word-btn ' + (highlightedIndices.has(index) ? 'highlight' : '');
                span.onpointerdown = (e) => { e.preventDefault(); toggleHighlight(index); };
                quoteDisplay.appendChild(span);
                quoteDisplay.appendChild(document.createTextNode(' '));
            });

            if (showAuthor.checked && authorInput.value.trim()) {
                authorDisplay.innerText = `— ${authorInput.value.trim()}`;
                authorDisplay.style.opacity = '0.8';
                authorDisplay.style.visibility = 'visible';
            } else {
                authorDisplay.style.opacity = '0';
                authorDisplay.style.visibility = 'hidden';
            }

            updateLogo();
        }

        function updateLogo() {
            const isWhiteBg = currentBg === 'white';
            const variant = isWhiteBg ? 'whiteBg' : 'standard';
            frameLogo.src = logoAssets[logoStyle][variant];
            
            if (!isWhiteBg) {
                frameLogo.classList.add('brightness-0', 'invert');
            } else {
                frameLogo.classList.remove('brightness-0', 'invert');
            }
        }

        function toggleHighlight(index) {
            highlightedIndices.has(index) ? highlightedIndices.delete(index) : highlightedIndices.add(index);
            updatePreview();
        }

        function setLogoStyle(style, btn) {
            logoStyle = style;
            const btns = btn.parentElement.querySelectorAll('button');
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateLogo();
        }

        function setBackground(type, btn) {
            currentBg = type;
            const bgMap = {
                'solid': { color: '#1c2c1a', img: 'none' },
                'img1': { color: 'transparent', img: "url('https://cdn.midjourney.com/3ce0bc29-b944-4d3a-8ae6-e2604604ee12/0_3.png')" },
                'img2': { color: 'transparent', img: "url('https://cdn.midjourney.com/f2413950-910c-4009-b380-446d0a164728/0_0.png')" },
                'img3': { color: 'transparent', img: "url('https://cdn.midjourney.com/c0f64c21-24f7-4b4d-baf0-a1b84ed9e902/0_0.png')" },
                'white': { color: '#ffffff', img: 'none' }
            };
            exportContainer.style.backgroundColor = bgMap[type].color;
            exportContainer.style.backgroundImage = bgMap[type].img;
            document.querySelectorAll('.bg-thumbnail').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            updateLogo();
        }

        function setTextColor(color, btn) {
            document.documentElement.style.setProperty('--frame-text-color', color);
            const isDark = color === '#1c2c1a';
            exportContainer.classList.toggle('frame-light-overlay', isDark);
            exportContainer.classList.toggle('frame-dark-overlay', !isDark);
            const btns = btn.parentElement.querySelectorAll('button');
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function setAlign(align, btn) {
            quoteDisplay.classList.remove('align-justify');
            quoteDisplay.style.textAlign = align;
            authorDisplay.style.textAlign = align;
            if (align === 'justify') quoteDisplay.classList.add('align-justify');
            const btns = btn.parentElement.querySelectorAll('button');
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function setCase(c, btn) {
            quoteDisplay.style.textTransform = c;
            const btns = btn.parentElement.querySelectorAll('button');
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function setRatio(r) {
            exportContainer.classList.remove('aspect-4-5', 'aspect-9-16');
            exportContainer.classList.add(`aspect-${r}`);
        }
        
        function setFont(f) { quoteDisplay.style.fontFamily = f; }

        document.getElementById('fontSize').oninput = (e) => quoteDisplay.style.fontSize = `${e.target.value}px`;
        document.getElementById('textWidth').oninput = (e) => quoteDisplay.style.width = `${e.target.value}%`;
        document.getElementById('fontWeight').oninput = (e) => quoteDisplay.style.fontWeight = e.target.value;
        document.getElementById('lineHeight').oninput = (e) => quoteDisplay.style.lineHeight = e.target.value;
        document.getElementById('logoScale').oninput = (e) => frameLogo.style.height = `${e.target.value}px`;
        document.getElementById('authorScale').oninput = (e) => authorDisplay.style.fontSize = `${e.target.value}px`;
        document.getElementById('contentY').oninput = (e) => contentMovable.style.transform = `translateY(${e.target.value}px)`;

        quoteInput.oninput = updatePreview;
        authorInput.oninput = updatePreview;

        async function downloadImage() {
            const btn = event.currentTarget;
            btn.innerText = "CAPTURING...";
            btn.disabled = true;
            try {
                const canvas = await html2canvas(exportContainer, {
                    scale: 3, 
                    useCORS: true,
                    backgroundColor: currentBg === 'white' ? '#ffffff' : '#1c2c1a'
                });
                const link = document.createElement('a');
                link.download = `wynmind-post-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            } catch (err) { console.error(err); }
            finally { btn.innerText = "CAPTURE POST"; btn.disabled = false; }
        }

        window.onload = () => {
            updatePreview();
            quoteDisplay.style.textTransform = "lowercase";
            
            // Default values that provide more horizontal space
            quoteDisplay.style.fontSize = "24px";
            quoteDisplay.style.width = "95%"; 
            quoteDisplay.style.fontWeight = "500";
            quoteDisplay.style.lineHeight = "1.1";
            
            setTextColor('#ffffff', document.querySelector('.btn-toggle.active'));
        };
    </script>
</body>
</html>
